{% extends "core/base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h3 class="mb-0">Fiche Client</h3>
                </div>
                <div class="card-body">
                    <h4 class="card-title text-primary mb-4">{{ client.nom }}</h4>
                    <p><strong>Email :</strong> {{ client.email }}</p>
                    <p><strong>Téléphone :</strong> <span class="badge bg-success fs-6">{{ client.telephone }}</span></p>
                </div>
                <div class="card-footer bg-white">
                    <a href="{% url 'liste_clients' %}" class="btn btn-secondary btn-sm">Retour à la liste</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
