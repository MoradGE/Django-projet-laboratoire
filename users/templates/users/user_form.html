{% extends "core/base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">{{ title }}</h4>
            </div>

            <div class="card-body">

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" value="{{ user_obj.username|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user_obj.email|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" name="first_name" class="form-control" value="{{ user_obj.first_name|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" name="last_name" class="form-control" value="{{ user_obj.last_name|default:'' }}">
                    </div>

                    {% if not user_obj %}
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Rôle</label>
                        <select name="role" class="form-select">
                            {% for value, label in roles %}
                                <option value="{{ value }}" {% if profil_obj.role == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="btn btn-dark">
                        {{ button_label }}
                    </button>

                    <a href="{% url 'user_list' %}" class="btn btn-secondary">
                        Annuler
                    </a>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
