{% extends 'core/base.html' %}

{% block content %}

<h2>Experiences</h2>

<table class="table table-striped table-bordered">
    <thead>
        <tr>
            <th>Titre</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
        {% for e in experiences %}
        <tr>
            <td>{{ e.titre }}</td>
            <td>{{ e.description }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" class="text-center text-muted">
                Aucune experience disponible.
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
