{% extends "core/base.html" %}

{% block title %}Supprimer membre{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="h3 mb-1">Supprimer le membre</h1>
    <p class="text-muted mb-0">Confirmation de suppression.</p>
</div>

<div class="confirm-panel">
    <p>Voulez-vous vraiment supprimer <strong>{{ membre.prenom }} {{ membre.nom }}</strong> ?</p>
    <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmer</button>
        <a class="btn btn-outline-secondary" href="{% url 'laboratoire_detail' membre.laboratoire.pk %}">Annuler</a>
    </form>
</div>
{% endblock %}
